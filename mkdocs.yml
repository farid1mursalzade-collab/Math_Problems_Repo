                    - '2. Combinatorics': '4_Metody_probabilistyczne/basic/02_combinatorics.md'
                    - '3. Probability Distributions': '4_Metody_probabilistyczne/basic/03_probability_distributions.md'
                    - '4. Discovering Formalism': '4_Metody_probabilistyczne/basic/04_discovery_formalism.md'
                    - '5. PMF, PDF, and CDF': '4_Metody_probabilistyczne/basic/05_pmf_pdf_cdf.md'
                    - '6. Conditional Probability': '4_Metody_probabilistyczne/basic/06_conditional_probability.md'
                    - '7. Data Analysis': '4_Metody_probabilistyczne/basic/07_data_analysis.md'
                    - '8. Statistical Inference': '4_Metody_probabilistyczne/basic/08_statistical_inference.md'
                - Advanced:
                    - '1. Events & Probability': '4_Metody_probabilistyczne/advanced/01_events_and_probability.md'
                    - '2. Random Variables': '4_Metody_probabilistyczne/advanced/02_random_variables.md'
                    - '3. Distribution Parameters': '4_Metody_probabilistyczne/advanced/03_distribution_parameters.md'
                    - '4. Selected Distributions': '4_Metody_probabilistyczne/advanced/04_selected_distributions.md'
                    - '5. Limit Theorems': '4_Metody_probabilistyczne/advanced/05_limit_theorems.md'
                    - '6. Basic Statistics': '4_Metody_probabilistyczne/advanced/06_basic_statistics.md'
                    - '7. Estimation': '4_Metody_probabilistyczne/advanced/07_estimation.md'
                    - '8. Hypothesis Testing': '4_Metody_probabilistyczne/advanced/08_hypothesis_testing.md'
                    - '9. Correlation & Regression': '4_Metody_probabilistyczne/advanced/09_correlation_and_regression.md'
